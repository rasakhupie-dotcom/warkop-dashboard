<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WarkopPOS — Halaman Tidak Ditemukan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root { --hijau:#1D9E75; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Plus Jakarta Sans',sans-serif;
      background:#0F0E0C; color:#F0EDE6;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      text-align:center; padding:24px;
    }
    .ikon   { font-size:60px; margin-bottom:16px; }
    h1      { font-family:'Space Mono',monospace; font-size:18px; margin-bottom:8px; color:var(--hijau); }
    p       { font-size:14px; color:#9C9890; margin-bottom:24px; line-height:1.6; }
    a       {
      display:inline-flex; align-items:center; gap:8px;
      padding:11px 22px; background:var(--hijau);
      color:#fff; border-radius:8px; font-size:13px; font-weight:700;
      text-decoration:none; transition:background .18s;
    }
    a:hover { background:#16875F; }
  </style>
</head>
<body>
  <div>
    <div class="ikon">☕</div>
    <h1>404 — Halaman Tidak Ditemukan</h1>
    <p>Halaman yang kamu cari tidak ada atau sudah dipindahkan.<br/>Kembali ke dashboard WarkopPOS.</p>
    <a href="/warkop-dashboard/">← Kembali ke Dashboard</a>
  </div>
</body>
</html>
